<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大陆报关</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/content-page.css" />
  </head>
  <body class="content-page">
    <main class="page-layout">
      <section class="page-hero">
        <p class="eyebrow">大陆报关</p>
        <h1>大陆报关总览</h1>
        <p>大陆报关目前作为一级业务入口页预留。后续如果要拆分更多子功能，建议继续在 `pages/mainland-customs/` 下逐页新增。</p>
        <span class="path-chip">左侧路径: 大陆报关</span>
      </section>

      <section class="page-panel">
        <div class="panel-heading">
          <div>
            <p class="section-kicker">规划</p>
            <h2>建议扩展方式</h2>
          </div>
        </div>
        <div class="panel-grid">
          <article class="note-card">
            <h3>按业务动作拆页</h3>
            <p>例如“报关异常”“资料回补”“接口重试”等，都可以各自维护 HTML 和 JS。</p>
          </article>
          <article class="note-card">
            <h3>保留统一主题</h3>
            <p>页面共用 Dark+ 风格和共享样式，但模板内容依旧各自存放，不会互相污染。</p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
