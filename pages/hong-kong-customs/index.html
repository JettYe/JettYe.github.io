<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>香港关务</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/content-page.css" />
  </head>
  <body class="content-page">
    <main class="page-layout">
      <section class="page-hero">
        <p class="eyebrow">香港关务</p>
        <h1>香港关务自助处理</h1>
        <p>这里作为香港关务业务域的总览页，已经预制了香港无缝、香港捆绑、香港报关三个二级节点，后续可以逐项落成独立子页面。</p>
        <span class="path-chip">左侧路径: 香港关务</span>
      </section>

      <section class="page-panel">
        <div class="panel-heading">
          <div>
            <p class="section-kicker">预置节点</p>
            <h2>二级菜单预制情况</h2>
          </div>
        </div>
        <div class="panel-grid">
          <article class="info-card">
            <span class="status-pill status-pending">待建</span>
            <h3>香港无缝</h3>
            <p>菜单已预留，后续可以独立新增 `pages/hong-kong-customs/seamless.html`。</p>
          </article>
          <article class="info-card">
            <span class="status-pill status-pending">待建</span>
            <h3>香港捆绑</h3>
            <p>菜单已预留，点击时先提示“未开发”，避免打开空页面。</p>
          </article>
          <article class="info-card">
            <span class="status-pill status-pending">待建</span>
            <h3>香港报关</h3>
            <p>建议后续按“页面 HTML + 页面专属 JS”继续扩展，保持结构清晰。</p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
