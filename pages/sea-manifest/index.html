<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海运舱单</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/content-page.css" />
  </head>
  <body class="content-page">
    <main class="page-layout">
      <section class="page-hero">
        <p class="eyebrow">海运舱单</p>
        <h1>海运舱单总览</h1>
        <p>海运舱单当前已预留独立一级页面，后续可以按照业务拆成多个单独维护页。</p>
        <span class="path-chip">左侧路径: 海运舱单</span>
      </section>

      <section class="page-panel">
        <div class="panel-heading">
          <div>
            <p class="section-kicker">后续拆分</p>
            <h2>推荐的后续拆分方向</h2>
          </div>
        </div>
        <div class="panel-grid">
          <article class="note-card">
            <h3>按异常类型拆分</h3>
            <p>适合把查询、修复、补录等动作拆成不同页面，避免一个页面过大。</p>
          </article>
          <article class="note-card">
            <h3>按维护动作拆分</h3>
            <p>如果每个动作都需要自己的模板 SQL 或接口请求，单页单功能会更稳妥。</p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
